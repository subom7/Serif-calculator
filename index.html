<!DOCTYPE html>
<html lang="en">
<head>
    <title>Calculator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.3.0/css/all.min.css" integrity="sha512-ApSLB1Pd3/bZN8fWB/RG9YhN/7bd9Hkf3AGaE2mPfebjrxagjuBtx2GcgdqIlJkUzwylBo61r9Xa9NmgBI0swA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="left-side-div">
        <div class="div-results-container">
            <h1 class="result result-default js-result">3454254</h1>
            <h3 class="equation equation-default js-equation">0</h3>
        </div>
        <div class="div-divider">
            <button class="button-in-divider button-user"><i class="fa-solid fa-user"></i></button>
            <button class="button-in-divider button-settings"><i class="fa-solid fa-gear"></i></button>
            <button class="button-in-divider button-toggle-scientific"><i class="fa-solid fa-square-root-variable"></i></button>
        </div>
        <div class="div-history-and-scientific">
            <div class="div-history"></div>
        </div>
    </div>
    <div class="right-side-div">
        <button class="calculator-button button-ac">AC</button>
        <button class="calculator-button button-parenthesis">()</button>
        <button class="calculator-button button-percent">%</button>
        <button class="calculator-button button-divide">/</button>
        
        <button class="calculator-button button-7">7</button>
        <button class="calculator-button button-8">8</button>
        <button class="calculator-button button-9">9</button>
        <button class="calculator-button button-multiply">*</button>

        <button class="calculator-button button-4">4</button>
        <button class="calculator-button button-5">5</button>
        <button class="calculator-button button-6">6</button>
        <button class="calculator-button button-minus">-</button>
        
        <button class="calculator-button button-1">1</button>
        <button class="calculator-button button-2">2</button>
        <button class="calculator-button button-3">3</button>
        <button class="calculator-button button-plus">+</button>

        <button class="calculator-button button-0">0</button>
        <button class="calculator-button button-point">.</button>
        <button class="calculator-button button-delete"><i class="fa-solid fa-delete-left"></i></button>
        <button class="calculator-button button-equals">=</button>
    </div>




    <script src="scripts/script.js" type="module"></script>
</body>
</html>
