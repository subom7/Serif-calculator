<!DOCTYPE html>
<html lang="en">
<head>
    <title>Calculator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.3.0/css/all.min.css" integrity="sha512-ApSLB1Pd3/bZN8fWB/RG9YhN/7bd9Hkf3AGaE2mPfebjrxagjuBtx2GcgdqIlJkUzwylBo61r9Xa9NmgBI0swA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="left-side-div"></div>
    <div class="right-side-div">
        <button class="calculator-button button-1-1">AC</button>
        <button class="calculator-button button-1-2">()</button>
        <button class="calculator-button button-1-3">%</button>
        <button class="calculator-button button-1-4">/</button>
        
        <button class="calculator-button button-2-1">7</button>
        <button class="calculator-button button-2-2">8</button>
        <button class="calculator-button button-2-3">9</button>
        <button class="calculator-button button-2-4">*</button>

        <button class="calculator-button button-3-1">4</button>
        <button class="calculator-button button-3-2">5</button>
        <button class="calculator-button button-3-3">6</button>
        <button class="calculator-button button-3-4">-</button>
        
        <button class="calculator-button button-4-1">1</button>
        <button class="calculator-button button-4-2">2</button>
        <button class="calculator-button button-4-3">3</button>
        <button class="calculator-button button-4-4">+</button>

        <button class="calculator-button button-5-1">0</button>
        <button class="calculator-button button-5-2">.</button>
        <button class="calculator-button button-5-3 button-delete"><i class="fa-solid fa-delete-left"></i></button>
        <button class="calculator-button button-5-4">=</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
